site_name: IBCS Operational Layer — Minimal Reference System (MRS)
site_url: https://jmusashi.github.io/ibcs-operational-layer/
repo_url: https://github.com/jmusashi/ibcs-operational-layer
repo_name: ibcs-operational-layer

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: blue
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - tables
  - toc:
      permalink: true

nav:
  - Home: README.md

  - MRS Documentation:
      - Overview: docs/mrs_overview.md
      - Design Principles: docs/design_principles.md
      - Extension Guide: docs/mrs_extension_guide.md
      - Paper 6.1 Mapping (Legacy): docs/paper_6_1_mapping.md
      - Convergence Guarantees: docs/convergence_guarantees.md
      - Pipeline Diagram: docs/diagrams/mrs_pipeline_diagram.md

  - CTS (Validation Layer):
      - CTS Overview: docs/cts/cts_overview.md
      - Compliance README: compliance/cts/README.md

  - Papers:
      - Reserved: docs/papers/

  - Paper 6.1 Operational Addendum:
      - Overview: paper_6_1/index.md
      - Architecture Overview: paper_6_1/architecture_overview.md
      - MRS Mapping: paper_6_1/mrs_mapping.md
      - CTS Mapping: paper_6_1/cts_mapping.md
      - Invariants: paper_6_1/paper_6_1_invariants.md
      - Surfaces: paper_6_1/paper_6_1_surfaces.md
      - Continuity Engine: paper_6_1/paper_6_1_continuity.md
      - Governance Layer: paper_6_1/paper_6_1_governance.md
      - Design Principles: paper_6_1/paper_6_1_design_principles.md
      - Simulation Examples: paper_6_1/simulation_examples.md
      - API Reference: paper_6_1/api_reference.md
